<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="am-left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B5BDB"/>
      <stop offset="0.5" stop-color="#22B8CF"/>
      <stop offset="1" stop-color="#00CFFF"/>
    </linearGradient>
    <linearGradient id="am-right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#228BE6"/>
      <stop offset="0.5" stop-color="#9C36B5"/>
      <stop offset="1" stop-color="#D63AF9"/>
    </linearGradient>
    <linearGradient id="textg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.5">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.8" cy="0.7" r="0.5">
      <stop offset="0" stop-color="#9C36B5" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#9C36B5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- AM Logo Mark -->
  <path d="M 90 280  L 150 100  L 182 188  L 166 188  L 150 130  L 106 280 Z" fill="url(#am-left)"/>
  <path d="M 270 280  L 210 100  L 178 188  L 194 188  L 210 130  L 254 280 Z" fill="url(#am-right)"/>
  <circle cx="180" cy="212" r="18" fill="url(#am-left)"/>
  <!-- Company name -->
  <text x="310" y="185" font-family="Inter, sans-serif" font-size="72" font-weight="900" letter-spacing="4" fill="#FFFFFF">AUTOMIND</text>
  <text x="310" y="230" font-family="Inter, sans-serif" font-size="22" font-weight="500" letter-spacing="4" fill="url(#am-left)">AUTOMATE. INNOVATE. ELEVATE.</text>
  <!-- Services tagline -->
  <text x="90" y="350" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="url(#textg)">Software Testing</text>
  <text x="90" y="420" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="url(#textg)">Web Development</text>
  <text x="90" y="490" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="url(#textg)">Graphic Design</text>
  <text x="90" y="558" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#CBD5E1">Premium services for modern businesses — automindtech.github.io</text>
